openapi: 3.0.3
info:
  title: FlatFlow API
  version: 1.0.0
  description: API documentation for FlatFlow
paths:
  /api/chores/:
    get:
      operationId: api_chores_list
      description: Return chores for the current household, with optional assignee
        and status filters. The default sort follows the chore-list priority order.
      summary: List chores
      parameters:
      - in: query
        name: assignee
        schema:
          type: string
          default: any
          minLength: 1
      - in: query
        name: sort
        schema:
          type: string
          default: default
          minLength: 1
      - in: query
        name: status
        schema:
          type: string
          default: all
          minLength: 1
      tags:
      - chores
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ChoreDetail'
          description: ''
        '401':
          description: No response body
        '404':
          description: No response body
    post:
      operationId: api_chores_create
      description: Create a Task or Duty in the current household.
      summary: Create chore
      tags:
      - chores
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChoreCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ChoreCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ChoreCreate'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChoreDetail'
          description: ''
        '400':
          description: No response body
        '401':
          description: No response body
        '404':
          description: No response body
  /api/chores/{id}/:
    get:
      operationId: api_chores_retrieve
      description: Return one chore from the current household.
      summary: Get chore
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this chore.
        required: true
      tags:
      - chores
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChoreDetail'
          description: ''
        '401':
          description: No response body
        '404':
          description: No response body
    put:
      operationId: api_chores_update
      description: Edit a chore. Chore type is immutable; status may be changed to
        reopen or complete a chore.
      summary: Update chore
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this chore.
        required: true
      tags:
      - chores
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChoreUpdate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ChoreUpdate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ChoreUpdate'
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChoreDetail'
          description: ''
        '400':
          description: No response body
        '401':
          description: No response body
        '404':
          description: No response body
    patch:
      operationId: api_chores_partial_update
      description: Edit one or more chore fields. Chore type is immutable; status
        may be changed to reopen or complete a chore.
      summary: Partially update chore
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this chore.
        required: true
      tags:
      - chores
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedChoreUpdate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedChoreUpdate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedChoreUpdate'
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChoreDetail'
          description: ''
        '400':
          description: No response body
        '401':
          description: No response body
        '404':
          description: No response body
    delete:
      operationId: api_chores_destroy
      description: Delete a chore from the current household.
      summary: Delete chore
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this chore.
        required: true
      tags:
      - chores
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '204':
          description: No response body
        '401':
          description: No response body
        '404':
          description: No response body
  /api/chores/{id}/complete/:
    post:
      operationId: api_chores_complete_create
      description: Mark a chore completed as the current user. Tasks can be completed
        at any time; Duties can be completed from their start date onward.
      summary: Mark chore completed
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this chore.
        required: true
      tags:
      - chores
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChoreDetail'
          description: ''
        '400':
          description: No response body
        '401':
          description: No response body
        '404':
          description: No response body
  /api/households/:
    post:
      operationId: api_households_create
      description: Create a new household and join it as the first member.
      summary: Create household
      tags:
      - households
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HouseholdCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/HouseholdCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/HouseholdCreate'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HouseholdDetail'
          description: ''
        '401':
          description: No response body
        '409':
          description: No response body
  /api/households/current/:
    get:
      operationId: api_households_current_retrieve
      description: Return the household the current user belongs to, with its members.
      summary: Current household
      tags:
      - households
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HouseholdDetail'
          description: ''
        '401':
          description: No response body
        '404':
          description: No response body
  /api/households/join/:
    post:
      operationId: api_households_join_create
      description: Join an existing household using its invite code.
      summary: Join household
      tags:
      - households
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HouseholdJoin'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/HouseholdJoin'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/HouseholdJoin'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HouseholdDetail'
          description: ''
        '401':
          description: No response body
        '404':
          description: No response body
        '409':
          description: No response body
  /api/households/leave/:
    post:
      operationId: api_households_leave_create
      description: Leave the current household. If the user is the last member, the
        household and all its data are deleted.
      summary: Leave household
      tags:
      - households
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaveResult'
          description: ''
        '401':
          description: No response body
        '404':
          description: No response body
  /api/rules/:
    get:
      operationId: api_rules_list
      description: List all house rules of the current household in chronological
        order.
      summary: List house rules
      tags:
      - rules
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RuleDetail'
          description: ''
        '401':
          description: No response body
        '404':
          description: No response body
    post:
      operationId: api_rules_create
      description: Add a new house rule to the current household.
      summary: Add house rule
      tags:
      - rules
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RuleWrite'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RuleWrite'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RuleWrite'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuleDetail'
          description: ''
        '400':
          description: No response body
        '401':
          description: No response body
        '404':
          description: No response body
  /api/rules/{id}/:
    put:
      operationId: api_rules_update
      description: Edit any house rule of the current household. Records the editor
        as the last-modified-by member.
      summary: Edit house rule
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: Rule ID.
        required: true
      tags:
      - rules
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RuleWrite'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RuleWrite'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RuleWrite'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuleDetail'
          description: ''
        '400':
          description: No response body
        '401':
          description: No response body
        '404':
          description: No response body
    delete:
      operationId: api_rules_destroy
      description: Delete any house rule of the current household.
      summary: Delete house rule
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: Rule ID.
        required: true
      tags:
      - rules
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '204':
          description: No response body
        '401':
          description: No response body
        '404':
          description: No response body
  /api/users/:
    post:
      operationId: api_users_create
      description: Create a new user account and start an authenticated session.
      summary: Register user
      tags:
      - users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserCreate'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthState'
          description: ''
  /api/users/csrf/:
    get:
      operationId: api_users_csrf_retrieve
      description: Issue a csrftoken cookie for browser clients before unsafe requests.
      summary: Set CSRF cookie
      tags:
      - users
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '204':
          description: No response body
  /api/users/login/:
    post:
      operationId: api_users_login_create
      description: Authenticate a user and start a persisted session.
      summary: Login user
      tags:
      - users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLogin'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserLogin'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserLogin'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthState'
          description: ''
        '401':
          description: No response body
  /api/users/logout/:
    post:
      operationId: api_users_logout_create
      description: End the current session. This is idempotent for anonymous or expired
        sessions.
      summary: Logout user
      tags:
      - users
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthState'
          description: ''
  /api/users/me/:
    get:
      operationId: api_users_me_retrieve
      description: Return the current user's authentication state.
      summary: Current auth state
      tags:
      - users
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthState'
          description: ''
  /api/users/profile/:
    get:
      operationId: api_users_profile_retrieve
      description: Return the authenticated user's profile.
      summary: Current user profile
      tags:
      - users
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
          description: ''
    put:
      operationId: api_users_profile_update
      description: Update the authenticated user's profile.
      summary: Update user profile
      tags:
      - users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserProfileUpdate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserProfileUpdate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserProfileUpdate'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
          description: ''
components:
  schemas:
    AuthState:
      type: object
      properties:
        authenticated:
          type: boolean
        user:
          allOf:
          - $ref: '#/components/schemas/User'
          nullable: true
        has_household:
          type: boolean
      required:
      - authenticated
      - has_household
      - user
    ChoreCreate:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/TypeEnum'
        title:
          type: string
          maxLength: 80
          minLength: 1
        description:
          type: string
          default: ''
          maxLength: 500
        assignee_id:
          type: integer
          nullable: true
        due_date:
          type: string
          format: date
          nullable: true
        start_date:
          type: string
          format: date
          nullable: true
        end_date:
          type: string
          format: date
          nullable: true
      required:
      - title
      - type
    ChoreDetail:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        type:
          allOf:
          - $ref: '#/components/schemas/TypeEnum'
          readOnly: true
        title:
          type: string
          readOnly: true
        description:
          type: string
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/ChoreDisplayStatus'
          readOnly: true
        stored_status:
          allOf:
          - $ref: '#/components/schemas/ChoreStatus'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        due_date:
          type: string
          format: date
          readOnly: true
          nullable: true
        start_date:
          type: string
          format: date
          readOnly: true
          nullable: true
        end_date:
          type: string
          format: date
          readOnly: true
          nullable: true
        completed_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        created_by:
          allOf:
          - $ref: '#/components/schemas/ChoreMember'
          readOnly: true
        assignee:
          allOf:
          - $ref: '#/components/schemas/ChoreMember'
          readOnly: true
          nullable: true
        completed_by:
          allOf:
          - $ref: '#/components/schemas/ChoreMember'
          readOnly: true
          nullable: true
      required:
      - assignee
      - completed_at
      - completed_by
      - created_at
      - created_by
      - description
      - due_date
      - end_date
      - id
      - start_date
      - status
      - stored_status
      - title
      - type
      - updated_at
    ChoreDisplayStatus:
      enum:
      - ACTIVE
      - COMPLETED
      - OVERDUE
      - PENDING_CONFIRMATION
      type: string
      description: |-
        * `ACTIVE` - Active
        * `COMPLETED` - Completed
        * `OVERDUE` - Overdue
        * `PENDING_CONFIRMATION` - Pending confirmation
    ChoreMember:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        display_name:
          type: string
          readOnly: true
        is_current_member:
          type: boolean
          readOnly: true
      required:
      - display_name
      - id
      - is_current_member
    ChoreStatus:
      enum:
      - ACTIVE
      - COMPLETED
      type: string
      description: |-
        * `ACTIVE` - Active
        * `COMPLETED` - Completed
    ChoreUpdate:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/TypeEnum'
        title:
          type: string
          maxLength: 80
          minLength: 1
        description:
          type: string
          maxLength: 500
        assignee_id:
          type: integer
          nullable: true
        due_date:
          type: string
          format: date
          nullable: true
        start_date:
          type: string
          format: date
          nullable: true
        end_date:
          type: string
          format: date
          nullable: true
        status:
          $ref: '#/components/schemas/ChoreStatus'
    HouseholdCreate:
      type: object
      properties:
        name:
          type: string
          maxLength: 60
          minLength: 1
      required:
      - name
    HouseholdDetail:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          readOnly: true
        invite_code:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        created_by:
          allOf:
          - $ref: '#/components/schemas/Member'
          readOnly: true
        members:
          type: array
          items:
            $ref: '#/components/schemas/Member'
          readOnly: true
      required:
      - created_at
      - created_by
      - id
      - invite_code
      - members
      - name
    HouseholdJoin:
      type: object
      properties:
        invite_code:
          type: string
          maxLength: 12
          minLength: 1
      required:
      - invite_code
    LeaveResult:
      type: object
      properties:
        household_deleted:
          type: boolean
          readOnly: true
      required:
      - household_deleted
    Member:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        display_name:
          type: string
          readOnly: true
      required:
      - display_name
      - id
    PatchedChoreUpdate:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/TypeEnum'
        title:
          type: string
          maxLength: 80
          minLength: 1
        description:
          type: string
          maxLength: 500
        assignee_id:
          type: integer
          nullable: true
        due_date:
          type: string
          format: date
          nullable: true
        start_date:
          type: string
          format: date
          nullable: true
        end_date:
          type: string
          format: date
          nullable: true
        status:
          $ref: '#/components/schemas/ChoreStatus'
    RuleDetail:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        text:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        last_modified_at:
          type: string
          format: date-time
          readOnly: true
        created_by:
          allOf:
          - $ref: '#/components/schemas/RuleMember'
          readOnly: true
        last_modified_by:
          allOf:
          - $ref: '#/components/schemas/RuleMember'
          readOnly: true
          nullable: true
      required:
      - created_at
      - created_by
      - id
      - last_modified_at
      - last_modified_by
      - text
    RuleMember:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        display_name:
          type: string
          readOnly: true
        is_current_member:
          type: boolean
          readOnly: true
      required:
      - display_name
      - id
      - is_current_member
    RuleWrite:
      type: object
      properties:
        text:
          type: string
          maxLength: 280
          minLength: 1
      required:
      - text
    TypeEnum:
      enum:
      - TASK
      - DUTY
      type: string
      description: |-
        * `TASK` - Task
        * `DUTY` - Duty
    User:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        email:
          type: string
          format: email
        display_name:
          type: string
          maxLength: 50
      required:
      - display_name
      - email
      - id
    UserCreate:
      type: object
      properties:
        email:
          type: string
          format: email
        display_name:
          type: string
          maxLength: 50
          minLength: 1
        password:
          type: string
          writeOnly: true
          minLength: 8
      required:
      - display_name
      - email
      - password
    UserLogin:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          writeOnly: true
      required:
      - email
      - password
    UserProfile:
      type: object
      properties:
        email:
          type: string
          format: email
          readOnly: true
        display_name:
          type: string
          readOnly: true
          maxLength: 50
      required:
      - display_name
      - email
    UserProfileUpdate:
      type: object
      properties:
        display_name:
          type: string
          maxLength: 50
          minLength: 1
      required:
      - display_name
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
